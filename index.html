// ==================== T2-3: CSV IMPORT ====================
function importCSVMembers(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length < 2) { alert('CSV ต้องมีอย่างน้อย 1 แถวข้อมูล + หัวตาราง'); return; }

      // Parse header to detect column mapping
      const header = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
      const colMap = {};
      const nickAliases = ['ชื่อเล่น', 'nickname', 'nick'];
      const nameAliases = ['ชื่อ-สกุล', 'ชื่อ', 'name', 'fullname', 'ชื่อ-นามสกุล'];
      const typeAliases = ['ประเภท', 'type', 'role'];
      const companyAliases = ['บริษัท', 'company'];
      const lcdAliases = ['ธุรกิจ', 'lcd', 'business'];
      const displayAliases = ['ชื่อแสดง', 'display', 'displayname'];

      header.forEach((h, i) => {
        if (nickAliases.includes(h)) colMap.nickname = i;
        else if (nameAliases.includes(h)) colMap.name = i;
        else if (typeAliases.includes(h)) colMap.type = i;
        else if (companyAliases.includes(h)) colMap.company = i;
        else if (lcdAliases.includes(h)) colMap.lcd = i;
        else if (displayAliases.includes(h)) colMap.display = i;
      });

      if (colMap.nickname === undefined && colMap.name === undefined) {
        alert('CSV ต้องมีคอลัมน์ "ชื่อเล่น" หรือ "ชื่อ"\nรองรับ: ชื่อเล่น, ชื่อ-สกุล, ประเภท, บริษัท, ธุรกิจ, ชื่อแสดง');
        return;
      }

      function parseCSVLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          if (line[i] === '"') { inQuotes = !inQuotes; continue; }
          if (line[i] === ',' && !inQuotes) { result.push(current.trim()); current = ''; continue; }
          current += line[i];
        }
        result.push(current.trim());
        return result;
      }

      const newMembers = [];
      let skipped = 0;
      const maxId = Math.max(0, ...ltMembers.map(m => m.id), ...regularMembers.map(m => m.id));

      for (let i = 1; i < lines.length; i++) {
        const cols = parseCSVLine(lines[i]);
        const nickname = cols[colMap.nickname] || '';
        const name = cols[colMap.name] || nickname;
        if (!nickname && !name) { skipped++; continue; }

        const type = colMap.type !== undefined ? (cols[colMap.type] || '').toUpperCase() : 'MEMBER';
        const memberType = (type === 'LT' || type === 'LEADERSHIP TEAM') ? 'LT' : 'MEMBER';

        newMembers.push({
          id: maxId + newMembers.length + 1,
          nickname: nickname || name,
          name: name || nickname,
          display: colMap.display !== undefined ? (cols[colMap.display] || '') : '',
          type: memberType,
          company: colMap.company !== undefined ? (cols[colMap.company] || '') : '',
          lcd: colMap.lcd !== undefined ? (cols[colMap.lcd] || '') : ''
        });
      }

      if (newMembers.length === 0) { alert('ไม่พบข้อมูลสมาชิกใน CSV'); return; }

      const ltCount = newMembers.filter(m => m.type === 'LT').length;
      const mCount = newMembers.filter(m => m.type === 'MEMBER').length;
      if (!confirm(`นำเข้า ${newMembers.length} คน (${ltCount} LT, ${mCount} MEMBER)\nข้อมูลจะถูกเพิ่มเข้าไปในรายชื่อที่มีอยู่`)) return;

      newMembers.forEach(m => {
        if (m.type === 'LT') ltMembers.push(m);
        else regularMembers.push(m);
      });

      saveMemberData();
      renderMembersTab();
      updatePoolStatus();
      currentWheelCount = 0;
      drawAllWheels();
      alert(`นำเข้าสำเร็จ: ${newMembers.length} คน`);
    } catch(err) {
      alert('ไม่สามารถอ่านไฟล์ CSV ได้: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ==================== PAIR FREQUENCY / MATRIX (1.1 + 2.3) ====================
function buildPairMatrix(optSpins) {
  const data = loadData();
  const confirmedOnly = document.getElementById('filterConfirmedOnly') && document.getElementById('filterConfirmedOnly').checked;
  let spins = optSpins || data.spins;

  // Date range filtering
  const fromEl = document.getElementById('filterDateFrom');
  const toEl = document.getElementById('filterDateTo');
  if (fromEl && fromEl.value) {
    const from = new Date(fromEl.value);
    spins = spins.filter(s => new Date(s.timestamp) >= from);
  }
  if (toEl && toEl.value) {
    const to = new Date(toEl.value);
    to.setHours(23, 59, 59, 999);
    spins = spins.filter(s => new Date(s.timestamp) <= to);
  }

  if (confirmedOnly) {
    spins = spins.map(spin => ({
      ...spin,
      groups: spin.groups.filter(g => g.confirmed)
    })).filter(spin => spin.groups.length > 0);
  }

  const freq = new Map();   // id -> Map(partnerId -> count)
  const lastMet = new Map(); // id -> Map(partnerId -> dateString)
  const pairCount = {};      // id -> total group count

  const allMem = getAllMembers();
  allMem.forEach(m => {
    freq.set(m.id, new Map());
    lastMet.set(m.id, new Map());
    pairCount[m.id] = 0;
  });

  spins.forEach(spin => {
    spin.groups.forEach(g => {
      const groupIds = getGroupAllIds(g);
      groupIds.forEach(id => {
        pairCount[id] = (pairCount[id] || 0) + 1;
        groupIds.forEach(otherId => {
          if (otherId !== id) {
            if (!freq.has(id)) freq.set(id, new Map());
            const fm = freq.get(id);
            fm.set(otherId, (fm.get(otherId) || 0) + 1);

            if (!lastMet.has(id)) lastMet.set(id, new Map());
            const lm = lastMet.get(id);
            const existing = lm.get(otherId);
            if (!existing || spin.timestamp > existing) {
              lm.set(otherId, spin.timestamp);
            }
          }
        });
      });
    });
  });

  return { freq, lastMet, pairCount, spins };
}

  const lastMetMap = matrix.lastMet.get(memberId) || new Map();

  const memberNotes = getNotesForMember(memberId);

  let html = `<div class="section-title green">เคยจับคู่กับ (${paired.length} คน)</div><div class="paired-list">`;
  if (paired.length === 0) html += '<div style="color:#999;padding:8px 0;">ยังไม่เคยจับคู่กับใครเลย</div>';
  paired.forEach(p => {

    let notesHtml = '';

    html += `<div class="pair-item"><span>${getDisplayName(m)}</span><span style="color:#888">${m.type}</span></div>`;

// ==================== SMART PAIRING (1.2) ====================
function smartPickMembers(availMembers, groupLt, alreadyPicked, matrix, count) {
  const picked = [];
  const reasons = []; // T2-1: track reasons per pick
  const candidates = availMembers.filter(m => !alreadyPicked.has(m.id));
  const rules = loadPairRules();

  for (let i = 0; i < count && candidates.length > 0; i++) {
    let bestIdx = -1;
    let bestScore = Infinity;
    let bestReasons = [];

    candidates.forEach((cand, idx) => {
      let score = 0;
      const candReasons = [];
      // Score against LT
      if (groupLt) {
        const ltFreq = matrix.freq.get(groupLt.id);
        const ltMet = ltFreq ? (ltFreq.get(cand.id) || 0) : 0;
        score += ltMet;
        if (ltMet === 0) candReasons.push('ยังไม่เคยเจอ ' + getDisplayName(groupLt));
        else candReasons.push('เจอ ' + getDisplayName(groupLt) + ' ' + ltMet + ' ครั้ง');
      }
      // Score against already picked members in this group
      picked.forEach(p => {
        const pFreq = matrix.freq.get(p.id);
        const pMet = pFreq ? (pFreq.get(cand.id) || 0) : 0;
        score += pMet;
      });

      // Apply pair rules (Feature F)
      const groupIds = [...(groupLt ? [groupLt.id] : []), ...picked.map(p => p.id)];
      let hasRule = false;
      rules.forEach(rule => {
        const ids = [rule.member1Id, rule.member2Id];
        if (ids.includes(cand.id)) {
          const otherId = ids.find(id => id !== cand.id);
          if (groupIds.includes(otherId)) {
            if (rule.type === 'exclude') { score += 1000; candReasons.push('กฎห้ามจับคู่'); hasRule = true; }
            if (rule.type === 'lock') { score -= 100; candReasons.push('กฎล็อคคู่'); hasRule = true; }
          }
        }
      });

      // Add randomness to avoid being deterministic
      score += Math.random() * 0.5;

      if (score < bestScore) {
        bestScore = score;
        bestIdx = idx;
        bestReasons = candReasons;
      }
    });

    if (bestIdx >= 0) {
      picked.push(candidates[bestIdx]);
      reasons.push({ member: candidates[bestIdx], score: Math.round(bestScore * 10) / 10, reasons: bestReasons });
      candidates.splice(bestIdx, 1);
    }
  }
  picked._smartReasons = reasons; // attach reasons to the array
  return picked;
}

// ==================== RELATIONSHIP HEATMAP (2.1) ====================
function renderHeatmap() {
  const section = document.getElementById('heatmapSection');
  if (!section) return;
  const matrix = buildPairMatrix();
  const allMem = getAllMembers();

  // Filter control
  const heatmapFilter = document.getElementById('heatmapFilter');
  const filterVal = heatmapFilter ? heatmapFilter.value : 'all';

  let members = allMem;
  if (filterVal === 'LT') members = allMem.filter(m => m.type === 'LT');
  else if (filterVal === 'MEMBER') members = allMem.filter(m => m.type === 'MEMBER');

  members.sort((a, b) => {
    if (a.type !== b.type) return a.type === 'LT' ? -1 : 1;
    return (a.nickname || '').localeCompare(b.nickname || '', 'th');
  });

  const n = members.length;
  if (n === 0) { section.innerHTML = ''; return; }

  const cellSize = n > 50 ? 10 : n > 30 ? 14 : 20;
  const labelSpace = 80;
  const canvasW = labelSpace + n * cellSize + 10;
  const canvasH = labelSpace + n * cellSize + 10;

  let html = '<h3 style="margin:20px 0 8px;color:#202124;">แผนภาพความสัมพันธ์</h3>';
  html += '<div class="heatmap-container">';
  html += '<div class="heatmap-controls">';
  html += `<select id="heatmapFilter" onchange="renderHeatmap()">
    <option value="all"${filterVal === 'all' ? ' selected' : ''}>ทุกคน</option>
    <option value="LT"${filterVal === 'LT' ? ' selected' : ''}>เฉพาะ LT</option>
    <option value="MEMBER"${filterVal === 'MEMBER' ? ' selected' : ''}>เฉพาะ MEMBER</option>
  </select>`;
  html += '</div>';
  html += `<div style="overflow:auto;max-height:600px;"><canvas id="heatmapCanvas" width="${canvasW}" height="${canvasH}"></canvas></div>`;
  html += '<div class="heatmap-legend"><span style="background:#fff"></span>ไม่เคยเจอ <span style="background:#fff3cd"></span>1 ครั้ง <span style="background:#f39c12"></span>2-3 ครั้ง <span style="background:#c0392b"></span>4+ ครั้ง</div>';
  html += '</div>';
  section.innerHTML = html;

  const canvas = document.getElementById('heatmapCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvasW, canvasH);

  // Draw labels
  ctx.font = (cellSize > 12 ? 10 : 8) + 'px sans-serif';
  ctx.fillStyle = '#444';
  members.forEach((m, i) => {
    ctx.save();
    ctx.translate(labelSpace + i * cellSize + cellSize / 2, labelSpace - 4);
    ctx.rotate(-Math.PI / 4);
    ctx.textAlign = 'left';
    ctx.fillText(getDisplayName(m).slice(0, 6), 0, 0);
    ctx.restore();

    ctx.textAlign = 'right';
    ctx.fillText(getDisplayName(m).slice(0, 6), labelSpace - 4, labelSpace + i * cellSize + cellSize / 2 + 3);
  });

  // Draw cells
  members.forEach((mRow, row) => {
    members.forEach((mCol, col) => {
      if (mRow.id === mCol.id) {
        ctx.fillStyle = '#e0e0e0';
      } else {
        const fm = matrix.freq.get(mRow.id);
        const count = fm ? (fm.get(mCol.id) || 0) : 0;
        if (count === 0) ctx.fillStyle = '#ffffff';
        else if (count === 1) ctx.fillStyle = '#fff3cd';
        else if (count <= 3) ctx.fillStyle = '#f39c12';
        else ctx.fillStyle = '#c0392b';
      }
      ctx.fillRect(labelSpace + col * cellSize, labelSpace + row * cellSize, cellSize - 1, cellSize - 1);
    });
  });

  // Hover tooltip
  const tooltip = document.getElementById('heatmapTooltip');
  canvas.onmousemove = function(e) {
    const rect = canvas.getBoundingClientRect();
    const scrollLeft = canvas.parentElement.scrollLeft;
    const scrollTop = canvas.parentElement.scrollTop;
    const x = e.clientX - rect.left + scrollLeft;
    const y = e.clientY - rect.top + scrollTop;
    const col = Math.floor((x - labelSpace) / cellSize);
    const row = Math.floor((y - labelSpace) / cellSize);

    if (col >= 0 && col < n && row >= 0 && row < n && row !== col) {
      const mRow = members[row];
      const mCol = members[col];
      const fm = matrix.freq.get(mRow.id);
      const count = fm ? (fm.get(mCol.id) || 0) : 0;
      const lm = matrix.lastMet.get(mRow.id);
      const lastMetStr = lm && lm.get(mCol.id) ? new Date(lm.get(mCol.id)).toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric' }) : '-';
      tooltip.textContent = `${getDisplayName(mRow)} × ${getDisplayName(mCol)}: ${count} ครั้ง (ล่าสุด ${lastMetStr})`;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY + 12) + 'px';
    } else {
      tooltip.style.display = 'none';
    }
  };

  document.getElementById('ruleFormOverlay').classList.remove('show');
}

function savePairRule() {
  const type = document.getElementById('ruleType').value;
  const m1Id = parseInt(document.getElementById('ruleMember1').value);
  const m2Id = parseInt(document.getElementById('ruleMember2').value);
  const reason = document.getElementById('ruleReason').value.trim();

  if (m1Id === m2Id) { alert('กรุณาเลือกสมาชิกคนละคน'); return; }

  const rules = loadPairRules();
  rules.push({ id: 'rule_' + Date.now(), type, member1Id: m1Id, member2Id: m2Id, reason });
  savePairRules(rules);
  hideRuleForm();
  renderPairRules();
  syncPush();
}

function deletePairRule(ruleId) {
  let rules = loadPairRules();
  rules = rules.filter(r => r.id !== ruleId);
  savePairRules(rules);
  renderPairRules();
  syncPush();
}

function applyPairRules(groups) {
  const rules = loadPairRules();
  if (rules.length === 0) return;

  // Try to fix exclude violations by swapping members between groups
  for (let attempt = 0; attempt < 20; attempt++) {
    let violated = false;
    for (const rule of rules) {
      if (rule.type !== 'exclude') continue;
      for (const g of groups) {
        const allIds = getGroupAllIds(g);
        if (allIds.includes(rule.member1Id) && allIds.includes(rule.member2Id)) {
          violated = true;
          // Try swapping member2 with someone from another group
          const m2Idx = g.members.findIndex(m => m.id === rule.member2Id);
          if (m2Idx === -1) continue;
          let swapped = false;
          for (const otherG of groups) {
            if (otherG === g) continue;
            for (let oi = 0; oi < otherG.members.length; oi++) {
              const otherAllIds = getGroupAllIds(otherG);
              // Check this swap wouldn't create new violation
              const wouldViolate = rules.some(r => {
                if (r.type !== 'exclude') return false;
                const newGIds = [...allIds.filter(id => id !== rule.member2Id), otherG.members[oi].id];
                const newOtherIds = [...otherAllIds.filter(id => id !== otherG.members[oi].id), g.members[m2Idx].id];
                return (newGIds.includes(r.member1Id) && newGIds.includes(r.member2Id)) ||
                       (newOtherIds.includes(r.member1Id) && newOtherIds.includes(r.member2Id));
              });
              if (!wouldViolate) {
                const temp = g.members[m2Idx];
                g.members[m2Idx] = otherG.members[oi];
                otherG.members[oi] = temp;
                swapped = true;
                break;
              }
            }
            if (swapped) break;
          }
        }
      }
    }
    if (!violated) break;
  }
}

function getTotalReferrals() {
  const data = loadData();
  let total = 0;
  data.spins.forEach(s => s.groups.forEach(g => { total += (g.referrals || 0); }));
  return total;
}

function getMemberReferrals(memberId) {
  const data = loadData();
  let total = 0;
  data.spins.forEach(spin => {
    spin.groups.forEach(g => {
      if ((g.referrals || 0) > 0) {
        const allIds = getGroupAllIds(g);
        if (allIds.includes(memberId)) total += g.referrals;
      }
    });
  });
  return total;
}

function getFollowUpStats() {
  const data = loadData();
  let pending = 0, done = 0;
  data.spins.forEach(spin => {
    spin.groups.forEach(g => {
      if (g.confirmed) {
        if (g.followedUp) done++;
        else pending++;
      }
    });
  });
  return { pending, done };
}

function getNotesForMember(memberId) {
  const data = loadData();
  const results = [];
  data.spins.forEach(spin => {
    spin.groups.forEach(g => {
      if (!g.notes || !g.notes.trim()) return;
      const allIds = getGroupAllIds(g);
      if (allIds.includes(memberId)) {
        results.push({ notes: g.notes, partnerIds: allIds.filter(id => id !== memberId), date: spin.timestamp });
      }
    });
  });
  return results;
}

// ==================== FEATURE C: DASHBOARD KPI ====================
function renderDashboard() {
  const section = document.getElementById('dashboardSection');
  if (!section) return;

  const data = loadData();
  const allSpins = data.spins;
  const allMem = getAllMembers();

  if (allSpins.length === 0) {
    section.innerHTML = '';
    return;
  }

  const matrix = buildPairMatrix();
  const totalSpins = allSpins.length;
  const pairedMembers = allMem.filter(m => matrix.pairCount[m.id] > 0).length;
  const pairingPct = allMem.length > 0 ? Math.round((pairedMembers / allMem.length) * 100) : 0;
  const confirmedGroups = allSpins.reduce((sum, s) => sum + s.groups.filter(g => g.confirmed).length, 0);
  const totalGroups = allSpins.reduce((sum, s) => sum + s.groups.length, 0);
  const confirmPct = totalGroups > 0 ? Math.round((confirmedGroups / totalGroups) * 100) : 0;

  // Top 5 active members
  const memberCounts = allMem.map(m => ({ member: m, count: matrix.pairCount[m.id] || 0 }))
    .sort((a, b) => b.count - a.count)
    .slice(0, 5);

  // Never paired alert
  const neverPaired = allMem.filter(m => !matrix.pairCount[m.id]);

  // Weekly trend (8 weeks)
  const weeklyData = buildWeeklyTrend(allSpins);

  let html = '';

  // Avg attendance rate
  const attendRates = allMem.map(m => totalSpins > 0 ? (matrix.pairCount[m.id] || 0) / totalSpins * 100 : 0);
  const avgAttendPct = attendRates.length > 0 ? Math.round(attendRates.reduce((a, b) => a + b, 0) / attendRates.length) : 0;
  const lowAttendCount = attendRates.filter(r => r < 30).length;

  // T2-4: Pairing diversity % (unique pairs met vs total possible)
  let metPairCount = 0;
  const totalPossiblePairs = allMem.length * (allMem.length - 1) / 2;
  for (let i = 0; i < allMem.length; i++) {
    const aFreq = matrix.freq.get(allMem[i].id);
    if (!aFreq) continue;
    for (let j = i + 1; j < allMem.length; j++) {
      if (aFreq.has(allMem[j].id)) metPairCount++;
    }
  }
  const diversityPct = totalPossiblePairs > 0 ? Math.round((metPairCount / totalPossiblePairs) * 100) : 0;

  // T2-2: Avg health score
  const monthlyTarget = getMonthlyTarget();
  const healthScores = allMem.map(m => calcHealthScore(m.id, matrix, totalSpins, monthlyTarget).health);
  const avgHealth = healthScores.length > 0 ? Math.round(healthScores.reduce((a, b) => a + b, 0) / healthScores.length) : 0;

  // T3-5: Total referrals
  const totalReferrals = getTotalReferrals();

  // KPI Cards
  html += '<div class="kpi-cards">';
  html += `<div class="kpi-card"><div class="kpi-num">${pairingPct}%</div><div class="kpi-label">จับคู่แล้ว</div></div>`;
  html += `<div class="kpi-card"><div class="kpi-num">${diversityPct}%</div><div class="kpi-label">ความหลากหลาย</div></div>`;
  html += `<div class="kpi-card"><div class="kpi-num">${avgAttendPct}%</div><div class="kpi-label">เฉลี่ยเข้าร่วม</div></div>`;
  html += `<div class="kpi-card"><div class="kpi-num">${healthBadgeHTML(avgHealth)}</div><div class="kpi-label">สุขภาพเฉลี่ย</div></div>`;
  html += `<div class="kpi-card"><div class="kpi-num">${totalReferrals}</div><div class="kpi-label">Referrals</div></div>`;
  html += '</div>';

  html += '<div class="dashboard-row">';

  // Top 5
  html += '<div class="dashboard-col">';
  html += '<h4 style="font-size:15px;font-weight:700;margin-bottom:8px;">Top 5 Active</h4>';
  html += '<div class="top5-list">';
  memberCounts.forEach((mc, i) => {
    html += `<div class="top5-item"><span class="top5-rank">${i + 1}</span><span style="flex:1">${getDisplayName(mc.member)} <small style="color:#888">(${mc.member.type})</small></span><span style="font-weight:700">${mc.count} ครั้ง</span></div>`;
  });
  html += '</div></div>';

  // Trend chart
  html += '<div class="dashboard-col">';
  html += '<h4 style="font-size:15px;font-weight:700;margin-bottom:8px;">กิจกรรมรายสัปดาห์</h4>';
  html += '<div class="trend-chart-container"><canvas id="trendChart" width="400" height="160"></canvas></div>';
  html += '</div>';

  html += '</div>';

  // Never-met pairs alert (Top 5 pairs that have never met)
  const neverMetPairs = [];
  for (let i = 0; i < allMem.length; i++) {
    for (let j = i + 1; j < allMem.length; j++) {
      const a = allMem[i], b = allMem[j];
      const aFreq = matrix.freq.get(a.id);
      if (!aFreq || !aFreq.has(b.id)) {
        neverMetPairs.push({ a, b });
        if (neverMetPairs.length >= 100) break; // cap for performance
      }
    }
    if (neverMetPairs.length >= 100) break;
  }

  if (neverMetPairs.length > 0) {
    const topPairs = neverMetPairs.slice(0, 5);
    const totalNever = neverMetPairs.length;
    const totalPossible = allMem.length * (allMem.length - 1) / 2;
    html += `<div class="alert-box alert-box-warning">`;
    html += `<div style="font-weight:700;margin-bottom:6px;">คู่ที่ยังไม่เคยเจอกัน (${totalNever >= 100 ? '100+' : totalNever} จาก ${totalPossible} คู่)</div>`;
    html += topPairs.map(p => `<span style="display:inline-block;background:#fff7ed;padding:2px 8px;border-radius:12px;margin:2px;font-size:12px;">${getDisplayName(p.a)} ↔ ${getDisplayName(p.b)}</span>`).join('');
    if (totalNever > 5) html += `<span style="font-size:12px;color:#92400e;margin-left:4px;">+${totalNever - 5} คู่</span>`;
    html += `</div>`;
  }

  if (neverPaired.length > 0) {
    html += `<div class="alert-box" style="background:#fffbeb;border-left:4px solid #f59e0b;padding:12px 16px;border-radius:8px;margin-top:10px;font-size:13px;color:#92400e;">สมาชิกที่ยังไม่เคยถูกจับคู่เลย: ${neverPaired.map(m => getDisplayName(m)).join(', ')}</div>`;
  }

  // Low attendance alert
  if (lowAttendCount > 0 && totalSpins >= 3) {
    const lowMembers = allMem.filter(m => totalSpins > 0 && (matrix.pairCount[m.id] || 0) / totalSpins * 100 < 30)
      .sort((a, b) => (matrix.pairCount[a.id] || 0) - (matrix.pairCount[b.id] || 0))
      .slice(0, 5);
    html += `<div class="alert-box" style="background:#fef2f2;border-left:4px solid #ef4444;padding:12px 16px;border-radius:8px;margin-top:10px;font-size:13px;color:#991b1b;">เข้าร่วมน้อย (<30%): ${lowMembers.map(m => getDisplayName(m) + ' ' + Math.round((matrix.pairCount[m.id]||0)/totalSpins*100) + '%').join(', ')}</div>`;
  }

  // T2-5: Follow-up reminders summary
  const fuStats = getFollowUpStats();
  if (fuStats.pending > 0) {
    html += `<div class="alert-box" style="background:#fffbeb;border-left:4px solid #f59e0b;padding:12px 16px;border-radius:8px;margin-top:10px;font-size:13px;color:#92400e;">รอติดตาม: ${fuStats.pending} กลุ่ม (ติดตามแล้ว ${fuStats.done})</div>`;
  }

  // T3-4: Dropout risk alert
  const dropoutRisk = getDropoutRiskMembers();
  if (dropoutRisk.length > 0 && totalSpins >= 3) {
    const top5Risk = dropoutRisk.slice(0, 5);
    html += `<div class="alert-box" style="background:#fef2f2;border-left:4px solid #dc2626;padding:12px 16px;border-radius:8px;margin-top:10px;font-size:13px;color:#991b1b;">`;
    html += `<div style="font-weight:700;margin-bottom:4px;">เสี่ยงหลุด (ไม่เข้าร่วม 4+ สัปดาห์) — ${dropoutRisk.length} คน</div>`;
    html += top5Risk.map(r => `<span style="display:inline-block;background:#fff5f5;padding:2px 8px;border-radius:12px;margin:2px;font-size:12px">${getDisplayName(r.member)} <small>(${r.weeksSince === 999 ? 'ไม่เคยเข้าร่วม' : r.weeksSince + ' wk'})</small></span>`).join('');
    if (dropoutRisk.length > 5) html += `<span style="font-size:12px;margin-left:4px">+${dropoutRisk.length - 5} คน</span>`;
    html += `</div>`;
  }

  section.innerHTML = html;
  drawTrendChart(weeklyData);
}

function buildWeeklyTrend(spins) {
  const weeks = [];
  const now = new Date();
  for (let i = 7; i >= 0; i--) {
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - (i * 7 + now.getDay()));
    weekStart.setHours(0, 0, 0, 0);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 7);
    const count = spins.filter(s => {
      const d = new Date(s.timestamp);
      return d >= weekStart && d < weekEnd;
    }).length;
    weeks.push({ label: `${weekStart.getDate()}/${weekStart.getMonth() + 1}`, count });
  }
  return weeks;
}

function drawTrendChart(data) {
  const canvas = document.getElementById('trendChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const pad = { top: 10, bottom: 30, left: 35, right: 10 };
  const barW = (w - pad.left - pad.right) / data.length;
  const maxVal = Math.max(1, ...data.map(d => d.count));

  ctx.clearRect(0, 0, w, h);

  const isDark = document.body.classList.contains('dark');
  const textColor = isDark ? '#8899aa' : '#6b7280';
  const gridColor = isDark ? '#0f3460' : '#f3f4f6';

  // Grid lines
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ((h - pad.top - pad.bottom) * (1 - i / 4));
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
    ctx.fillStyle = textColor;
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(maxVal * i / 4), pad.left - 4, y + 3);
  }

  // Bars
  data.forEach((d, i) => {
    const barH = d.count > 0 ? ((h - pad.top - pad.bottom) * d.count / maxVal) : 0;
    const x = pad.left + i * barW + barW * 0.15;
    const y = h - pad.bottom - barH;
    const bw = barW * 0.7;

    const gradient = ctx.createLinearGradient(x, y, x, h - pad.bottom);
    gradient.addColorStop(0, '#cf202e');
    gradient.addColorStop(1, '#ef4444');
    ctx.fillStyle = gradient;
    ctx.fillRect(x, y, bw, barH);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.roundRect(x, y, bw, Math.min(4, barH), [4, 4, 0, 0]);

    // Label
    ctx.fillStyle = textColor;
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(d.label, pad.left + i * barW + barW / 2, h - pad.bottom + 14);

    if (d.count > 0) {
      ctx.fillStyle = isDark ? '#f0f0f0' : '#111827';
      ctx.font = 'bold 10px sans-serif';
      ctx.fillText(d.count, pad.left + i * barW + barW / 2, y - 4);
    }
  });
}

// ==================== FEATURE D: INDIVIDUAL GOALS ====================
function getMonthlyTarget() {
  const el = document.getElementById('goalMonthlyTarget');
  const val = el ? parseInt(el.value) : 4;
  return val > 0 ? val : 4;
}

function countMeetingsThisMonth(memberId, spins) {
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const monthEnd = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59, 999);
  let count = 0;
  spins.forEach(spin => {
    const d = new Date(spin.timestamp);
    if (d < monthStart || d > monthEnd) return;
    spin.groups.forEach(g => {
      const allIds = getGroupAllIds(g);
      if (allIds.includes(memberId)) count++;
    });
  });
  return count;
}

function onGoalChange() {
  const s = loadSettings();
  s.monthlyTarget = getMonthlyTarget();
  saveSettings(s);
  renderSummary();
}

// ==================== FEATURE H: CLOUD SYNC (FIREBASE) ====================
const SYNC_KEY = 'bni121_sync';
let firebaseApp = null;
let firebaseDb = null;
let syncListener = null;
let syncEnabled = false;

function loadSyncConfig() {
  try {
    const raw = localStorage.getItem(SYNC_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { enabled: false, roomId: null, lastSync: null, firebaseConfig: null };
}

function saveSyncConfig(config) {
  localStorage.setItem(SYNC_KEY, JSON.stringify(config));
}

function initFirebase() {
  const config = loadSyncConfig();
  if (!config.firebaseConfig) return false;
  try {
    if (!firebaseApp) {
      firebaseApp = firebase.initializeApp(config.firebaseConfig);
    }
    firebaseDb = firebase.database();
    return true;
  } catch(e) {
    console.error('Firebase init failed:', e);
    return false;
  }
}

function generateRoomId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function renderSyncSection() {
  const el = document.getElementById('syncContent');
  if (!el) return;
  const config = loadSyncConfig();

  if (!config.firebaseConfig) {
    el.innerHTML = `
      <p style="color:#6b7280;font-size:13px;margin-bottom:12px;">
        ตั้งค่า Firebase เพื่อเปิดใช้ Cloud Sync ระหว่างอุปกรณ์<br>
        <small>สร้าง Firebase Realtime Database project แล้ววาง config ด้านล่าง</small>
      </p>
      <textarea id="firebaseConfigInput" style="width:100%;min-height:100px;padding:10px;border-radius:10px;border:1.5px solid #e5e7eb;font-family:monospace;font-size:12px;resize:vertical;" placeholder='{"apiKey":"...","authDomain":"...","databaseURL":"...","projectId":"..."}'></textarea>
      <div class="sync-toolbar">
        <button class="btn-sync btn-sync-create" onclick="saveFirebaseConfig()">บันทึก Config</button>
      </div>
    `;
    return;
  }

  if (!config.enabled || !config.roomId) {
    el.innerHTML = `
      <p style="color:#6b7280;font-size:13px;margin-bottom:12px;">สร้างหรือเข้าร่วมห้อง Sync</p>
      <div class="sync-toolbar">
        <button class="btn-sync btn-sync-create" onclick="createSyncRoom()">สร้างห้องใหม่</button>
        <input type="text" class="sync-input" id="joinRoomInput" placeholder="รหัสห้อง" maxlength="6">
        <button class="btn-sync btn-sync-join" onclick="joinSyncRoom()">เข้าร่วม</button>
      </div>
      <div class="sync-toolbar">
        <button style="font-size:12px;color:#ef4444;background:none;border:none;cursor:pointer;text-decoration:underline" onclick="resetFirebaseConfig()">รีเซ็ต Firebase Config</button>
      </div>
    `;
    return;
  }

  const statusClass = syncEnabled ? 'connected' : 'disconnected';
  const statusText = syncEnabled ? 'เชื่อมต่อแล้ว' : 'ไม่ได้เชื่อมต่อ';
  el.innerHTML = `
    <div class="sync-room-code">${config.roomId}</div>
    <p class="sync-status-text">สถานะ: <span class="sync-dot ${statusClass}" style="display:inline-block"></span> ${statusText}</p>
    ${config.lastSync ? `<p class="sync-status-text">Sync ล่าสุด: ${new Date(config.lastSync).toLocaleString('th-TH')}</p>` : ''}
    <div class="sync-toolbar">
      <button class="btn-sync btn-sync-create" onclick="syncPush()" ${!syncEnabled ? 'disabled' : ''}>Push ข้อมูล</button>
      <button class="btn-sync btn-sync-disconnect" onclick="disconnectSync()">ยกเลิกการเชื่อมต่อ</button>
    </div>
  `;

  // Update header dot
  const dot = document.getElementById('syncDot');
  if (dot) {
    dot.style.display = 'inline-block';
    dot.className = 'sync-dot ' + statusClass;
  }
}

function saveFirebaseConfig() {
  const input = document.getElementById('firebaseConfigInput');
  if (!input) return;
  try {
    const config = JSON.parse(input.value.trim());
    if (!config.databaseURL) { alert('Config ต้องมี databaseURL'); return; }
    const syncConfig = loadSyncConfig();
    syncConfig.firebaseConfig = config;
    saveSyncConfig(syncConfig);
    renderSyncSection();
  } catch(e) {
    alert('รูปแบบ JSON ไม่ถูกต้อง');
  }
}

function resetFirebaseConfig() {
  if (!confirm('รีเซ็ต Firebase Config? จะต้องตั้งค่าใหม่')) return;
  disconnectSync();
  const syncConfig = { enabled: false, roomId: null, lastSync: null, firebaseConfig: null };
  saveSyncConfig(syncConfig);
  renderSyncSection();
}

function createSyncRoom() {
  if (!initFirebase()) { alert('Firebase ยังไม่พร้อม'); return; }
  const roomId = generateRoomId();
  const config = loadSyncConfig();
  config.roomId = roomId;
  config.enabled = true;
  saveSyncConfig(config);
  startSync(roomId);
  syncPush();
  renderSyncSection();
}

function joinSyncRoom() {
  const input = document.getElementById('joinRoomInput');
  if (!input) return;
  const roomId = input.value.trim().toUpperCase();
  if (roomId.length !== 6) { alert('รหัสห้อง 6 ตัว'); return; }
  if (!initFirebase()) { alert('Firebase ยังไม่พร้อม'); return; }

  const config = loadSyncConfig();
  config.roomId = roomId;
  config.enabled = true;
  saveSyncConfig(config);
  startSync(roomId);
  renderSyncSection();
}

function startSync(roomId) {
  if (!firebaseDb) {
    if (!initFirebase()) return;
  }
  if (syncListener) {
    firebaseDb.ref('rooms/' + loadSyncConfig().roomId).off('value', syncListener);
  }
  syncEnabled = true;
  const ref = firebaseDb.ref('rooms/' + roomId);
  syncListener = ref.on('value', (snapshot) => {
    const cloudData = snapshot.val();
    if (cloudData && cloudData._lastUpdate) {
      const config = loadSyncConfig();
      if (config.lastSync && cloudData._lastUpdate <= config.lastSync) return;
      applyCloudData(cloudData);
      config.lastSync = cloudData._lastUpdate;
      saveSyncConfig(config);
      renderSyncSection();
    }
  });

  const dot = document.getElementById('syncDot');
  if (dot) { dot.style.display = 'inline-block'; dot.className = 'sync-dot connected'; }
}

function syncPush() {
  const config = loadSyncConfig();
  if (!config.enabled || !config.roomId || !firebaseDb) return;

  const now = new Date().toISOString();
  const payload = {
    _lastUpdate: now,
    members: localStorage.getItem(MEMBERS_KEY) || '{}',
    data: localStorage.getItem(STORAGE_KEY) || '{}',
    settings: localStorage.getItem(SETTINGS_KEY) || '{}',
    absent: localStorage.getItem(ABSENT_KEY) || '[]',
    pairrules: localStorage.getItem(PAIRRULES_KEY) || '{"rules":[]}'
  };

  firebaseDb.ref('rooms/' + config.roomId).set(payload);
  config.lastSync = now;
  saveSyncConfig(config);
}

function applyCloudData(cloudData) {
  if (cloudData.members) localStorage.setItem(MEMBERS_KEY, cloudData.members);
  if (cloudData.data) localStorage.setItem(STORAGE_KEY, cloudData.data);
  if (cloudData.settings) localStorage.setItem(SETTINGS_KEY, cloudData.settings);
  if (cloudData.absent) localStorage.setItem(ABSENT_KEY, cloudData.absent);
  if (cloudData.pairrules) localStorage.setItem(PAIRRULES_KEY, cloudData.pairrules);

  // Reload UI
  loadMemberData();
  loadSession();
  loadAbsent();
  currentWheelCount = 0;
  updatePoolStatus();
  drawAllWheels();
  const activeTab = document.querySelector('.tab-btn.active');
  if (activeTab) {
    const tabText = activeTab.textContent;
    if (tabText.includes('ประวัติ')) renderHistory();
    if (tabText.includes('สรุป')) renderSummary();
    if (tabText.includes('จัดการ')) { renderMembersTab(); renderPairRules(); renderSyncSection(); }
  }
}

function disconnectSync() {
  if (syncListener && firebaseDb) {
    const config = loadSyncConfig();
    if (config.roomId) firebaseDb.ref('rooms/' + config.roomId).off('value', syncListener);
  }
  syncListener = null;
  syncEnabled = false;
  const config = loadSyncConfig();
  config.enabled = false;
  config.roomId = null;
  saveSyncConfig(config);
  const dot = document.getElementById('syncDot');
  if (dot) { dot.style.display = 'none'; }
  renderSyncSection();
}

// ==================== MODAL: ESCAPE KEY + CLICK OVERLAY ====================
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    const overlays = [
      { id: 'notesFormOverlay', close: hideNotesForm },
      { id: 'ruleFormOverlay', close: hideRuleForm },
      { id: 'memberFormOverlay', close: hideMemberForm },
      { id: 'monthlyReportModal', close: closeMonthlyReport },
      { id: 'memberDetailModal', close: closeMemberDetailModal }
    ];
    for (const ov of overlays) {
      const el = document.getElementById(ov.id);
      if (el && el.classList.contains('show')) { ov.close(); return; }
    }
  }
});

['memberFormOverlay', 'memberDetailModal', 'ruleFormOverlay', 'notesFormOverlay', 'monthlyReportModal'].forEach(id => {
  const el = document.getElementById(id);
  if (el) {
    el.addEventListener('click', function(e) {
      if (e.target === el) {
        if (id === 'memberFormOverlay') hideMemberForm();
        else if (id === 'memberDetailModal') closeMemberDetailModal();
        else if (id === 'ruleFormOverlay') hideRuleForm();
        else if (id === 'notesFormOverlay') hideNotesForm();
        else if (id === 'monthlyReportModal') closeMonthlyReport();
      }
    });
  }
});

// ==================== INIT ====================
loadMemberData();
loadSession();
loadAbsent();
loadDarkMode();
updatePoolStatus();
drawAllWheels();
renderPairRules();
renderSyncSection();

// Auto-reconnect sync if was enabled
(function autoReconnectSync() {
  const config = loadSyncConfig();
  if (config.enabled && config.roomId && config.firebaseConfig) {
    if (initFirebase()) {
      startSync(config.roomId);
    }
  }
})();
</script>
